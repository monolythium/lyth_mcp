name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Gitleaks
        run: bash .github/scripts/install-gitleaks.sh

      - name: Scan the current source tree for secrets
        run: gitleaks dir . --redact=100 --no-banner --no-color

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.22.1
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check types
        run: npm run typecheck

      - name: Run full test suite
        run: npm test

      - name: Verify public package boundary
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run --json --ignore-scripts > /tmp/package-report.json
          jq -r '.[0].files[].path' /tmp/package-report.json | LC_ALL=C sort > /tmp/package-files.actual
          diff --unified=3 -- .github/package-files.allowlist.txt /tmp/package-files.actual
